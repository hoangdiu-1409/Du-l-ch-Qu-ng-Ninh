<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Liên hệ</title>
    <link rel="stylesheet" href="contact.css" />
  </head>

  <body>
    <!-- HEADER -->
    <header class="header">
      <div class="container nav">
        <h1>Kết nối với chúng tôi</h1>
        <ul>
          <li><a href="index.html" class="home-btn">Trang chủ</a></li>
        </ul>
      </div>
    </header>

    <!-- BANNER -->
    <section class="banner"><br /><br /><br /><br /><br /></section>

    <!-- CONTACT -->
    <section class="contact container">
      <!-- FORM -->
      <div class="form-box">
        <h2>Gửi tin nhắn</h2>

        <input type="text" id="name" placeholder="Họ và tên" />
        <input type="email" id="email" placeholder="Email" />
        <textarea id="message" placeholder="Nội dung"></textarea>

        <button onclick="sendForm()">Gửi</button>

        <p id="msg"></p>
      </div>

      <!-- INFO -->
      <div class="info-box">
        <h2>Thông tin liên hệ</h2>
        <p>📍 Quảng Ninh, Việt Nam</p>
        <p>📞 0203.123.4567</p>
        <p>📧 quangninhtravel@gmail.com</p>
      </div>
    </section>

    <script src="contact.js"></script>
    <footer>
      <p>Du lịch Quảng Ninh</p>
    </footer>
  </body>
</html>
